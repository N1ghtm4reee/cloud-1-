---
- name: Install Docker requirements on managed servers
  hosts: host
  become: true
  gather_facts: true

  tasks:
    - name: Validate the managed server
      ansible.builtin.assert:
        that:
          - ansible_facts["distribution"] == "Ubuntu"
          - ansible_facts["python"]["version"]["major"] | int >= 3
        fail_msg: >-
          This playbook requires an Ubuntu server with Python 3 installed.

    - name: Remove packages that conflict with Docker Engine
      ansible.builtin.apt:
        name:
          - containerd
          - docker-compose
          - docker-compose-v2
          - docker-doc
          - docker.io
          - podman-docker
          - runc
        state: absent

    - name: Install Docker repository prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - python3-apt
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Create the APT keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install Docker's official APT signing key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        owner: root
        group: root
        mode: "0644"

    - name: Configure Docker's official APT repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.sources
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ ansible_facts["distribution_release"] }}
          Components: stable
          Signed-By: /etc/apt/keyrings/docker.asc

    - name: Install Docker Engine and Compose
      ansible.builtin.apt:
        name:
          - containerd.io
          - docker-buildx-plugin
          - docker-ce
          - docker-ce-cli
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Verify the Docker daemon is responding
      ansible.builtin.command: docker info
      changed_when: false

    - name: Read the installed Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Read the installed Docker Compose version
      ansible.builtin.command: docker compose version
      register: docker_compose_version
      changed_when: false

    - name: Show the installed Docker versions
      ansible.builtin.debug:
        msg:
          - "{{ docker_version.stdout }}"
          - "{{ docker_compose_version.stdout }}"
